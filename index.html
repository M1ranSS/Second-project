<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Todo</title>

  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 40px auto;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 16px;
      cursor: pointer;
    }

    li {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: #f1f1f1;
    }

    .delete {
      background: crimson;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Todo List</h1>

  <div class="row">
    <input id="taskInput" type="text" placeholder="Введите задачу">
    <button id="addBtn">Добавить</button>
  </div>

  <ul id="taskList"></ul>

  <script src="script.js"></script>

</body>
</html>
